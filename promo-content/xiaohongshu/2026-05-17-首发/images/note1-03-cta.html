<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750,height=1000">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:750px;height:1000px;overflow:hidden;
  font-family:Inter,"Microsoft YaHei","PingFang SC",sans-serif;
  background:#FEFCF8;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:72px;
}
.accent-line{width:40px;height:3px;background:#C2640D;margin-bottom:40px}
.title{font-size:42px;font-weight:700;color:#1A1816;line-height:1.3;text-align:center}
.repo{
  font-size:22px;color:#C2640D;font-weight:500;margin:24px 0;
  font-family:"Cascadia Code","Fira Code",Consolas,monospace;
  letter-spacing:-0.5px;
}
.desc{font-size:20px;color:#6B6560;line-height:1.6;text-align:center;max-width:500px}
.gh-link{
  margin-top:40px;font-size:18px;color:#9E9890;text-align:center;
  padding:14px 36px;border:1px solid #EDE9E4;border-radius:4px;
}
</style>
</head>
<body>
<div class="accent-line"></div>
<h2 class="title">觉得有用的话给个 Star</h2>
<div class="repo">therain2020/ssh-mobile-workflow</div>
<p class="desc">GitHub 已开源，链接在评论区。有问题直接问，看到就回。</p>
<div class="gh-link">github.com/therain2020/ssh-mobile-workflow</div>
</body>
</html>
